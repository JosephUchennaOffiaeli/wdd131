<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W04 Activity: HTML Tables</title>
    <link rel="stylesheet" href="table-styles.css">
</head>
<body>

    <main>
        <table>
            <caption>Table 1: Account Feature Comparison</caption>
            
            <thead>
                <tr>
                    <th colspan="4" class="table-header">ACME Wildwest Services</th>
                </tr>
                <tr>
                    <th></th>
                    <th scope="col">Basic</th>
                    <th scope="col">Premium</th>
                    <th scope="col">Deluxe</th>
                </tr>
            </thead>
            
            <tbody>
                <tr>
                    <th scope="row">Feature 1</th>
                    <td class="check">✔</td>
                    <td class="check">✔</td>
                    <td class="check">✔</td>
                </tr>
                <tr>
                    <th scope="row">Feature 2</th>
                    <td class="cross">❌</td>
                    <td class="check">✔</td>
                    <td class="check">✔</td>
                </tr>
                <tr>
                    <th scope="row">Feature 3</th>
                    <td class="cross">❌</td>
                    <td class="cross">❌</td>
                    <td class="check">✔</td>
                </tr>
            </tbody>
        </table>
    </main>

</body>
</html>
