<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Temple Album</title>
  <meta name="description" content="Responsive temple album page with a hamburger menu and picture grid.">
  <meta name="author" content="Joseph Uchenna Offiaeli">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Libre+Franklin:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/temples.css">
  <link rel="stylesheet" href="styles/temples-large.css">
  <script src="scripts/temples.js" defer></script>
</head>
<body>
  <header>
    <div class="brand-bar">
      <button id="menu-toggle" aria-expanded="false" aria-label="Open navigation menu">☰</button>
      <h1>Temple Album</h1>
    </div>
    <nav id="primary-nav">
      <a href="#" class="active">Home</a>
      <a href="#">Old</a>
      <a href="#">New</a>
      <a href="#">Large</a>
      <a href="#">Small</a>
    </nav>
  </header>

  <main>
    <section class="intro">
      <h2>Explore LDS temple architecture</h2>
      <p>Enjoy a responsive album featuring actual temples from The Church of Jesus Christ of Latter-day Saints.</p>
    </section>

    <section class="gallery">
      <h2>Temple Gallery</h2>
      <figure>
        <img src="images/temples/salt_lake_temple.jpg" alt="Salt Lake Temple">
        <figcaption>Salt Lake Temple</figcaption>
      </figure>
      <figure>
        <img src="images/temples/nauvoo_illinois_temple.jpg" alt="Nauvoo Illinois Temple">
        <figcaption>Nauvoo Illinois Temple</figcaption>
      </figure>
      <figure>
        <img src="images/temples/washington_dc_temple.jpg" alt="Washington D.C. Temple">
        <figcaption>Washington D.C. Temple</figcaption>
      </figure>
      <figure>
        <img src="images/temples/san_diego_temple.jpg" alt="San Diego California Temple">
        <figcaption>San Diego California Temple</figcaption>
      </figure>
      <figure>
        <img src="images/temples/laie_hawaii_temple.jpg" alt="Laie Hawaii Temple">
        <figcaption>Laie Hawaii Temple</figcaption>
      </figure>
      <figure>
        <img src="images/temples/jordan_river_utah_temple.jpg" alt="Jordan River Utah Temple">
        <figcaption>Jordan River Utah Temple</figcaption>
      </figure>
      <figure>
        <img src="images/temples/st_george_utah_temple.jpg" alt="St. George Utah Temple">
        <figcaption>St. George Utah Temple</figcaption>
      </figure>
      <figure>
        <img src="images/temples/mesa_arizona_temple.jpg" alt="Mesa Arizona Temple">
        <figcaption>Mesa Arizona Temple</figcaption>
      </figure>
      <figure>
        <img src="images/temples/rome_italy_temple.jpg" alt="Rome Italy Temple">
        <figcaption>Rome Italy Temple</figcaption>
      </figure>
    </section>
  </main>

  <footer>
    <p>&copy; <span id="copyright-year"></span> Joseph Uchenna Offiaeli | Lagos, Nigeria</p>
    <p>Last modified: <span id="last-modified"></span></p>
  </footer>
</body>
</html>
