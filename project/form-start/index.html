<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>Course Proposal Application</title>
    <link href="css/normalize.css" rel="stylesheet">
    <link href="css/small.css" rel="stylesheet">
    <link href="css/medium.css" rel="stylesheet">
    <link href="css/large.css" rel="stylesheet">
    <link href="css/form.css" rel="stylesheet">
</head>
<body>
    <header>
        <h1>Course Proposal</h1>
        <h2>Designing Web Forms</h2>
    </header>

    <nav>
        <ul>
            <li><a href="#">About</a></li>
            <li class="active"><a href="index.html">Propose</a></li>
            <li><a href="#">Winners</a></li>
            <li><a href="#">Contact</a></li>    
        </ul>
    </nav>

    <main>
        <h1>Course Proposal Application</h1>
        <form method="get" action="thanks.html">
            <fieldset>
                <legend>Applicant Information</legend>
                <div class="form-group">
                    <label for="fullname">Full Name:</label>
                    <input type="text" id="fullname" name="fullname" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address:</label>
                    <input type="email" id="email" name="email" required>
                </div>
            </fieldset>

            <fieldset>
                <legend>Course Details</legend>
                <div class="form-group">
                    <label for="course">Course Name:</label>
                    <input type="text" id="course" name="course" required>
                </div>
                <div class="form-group">
                    <label for="description">Brief Description:</label>
                    <textarea id="description" name="description" rows="4" required></textarea>
                </div>
            </fieldset>
            <button type="submit">Submit Proposal</button>
        </form>
    </main>

    <footer>
        &copy; 2026 &bull; Joseph Uchenna Offiaeli &bull; 234-810-0197-390
    </footer>
</body>
</html>
