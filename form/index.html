<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Product Review Form for WDD 131. Users can select products, rate them, and track submission counts.">
    <meta name="author" content="Joseph Uchenna Offiaeli">
    <title>Product Review | Product Review Form</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Product Review Form</h1>
    </header>

    <main>
        <form action="review.html" method="get">
            <label for="product">Product Name *</label>
            <select id="product" name="product" required>
                <option value="" disabled selected>Select a Product...</option>
            </select>

            <fieldset>
                <legend>Overall Rating *</legend>
                <label for="r1"><input type="radio" id="r1" name="rating" value="1" required> 1</label>
                <label for="r2"><input type="radio" id="r2" name="rating" value="2" required> 2</label>
                <label for="r3"><input type="radio" id="r3" name="rating" value="3" required> 3</label>
                <label for="r4"><input type="radio" id="r4" name="rating" value="4" required> 4</label>
                <label for="r5"><input type="radio" id="r5" name="rating" value="5" required> 5</label>
            </fieldset>

            <label for="installDate">Date of Installation *</label>
            <input type="date" id="installDate" name="installDate" required>

            <p>Useful Features (Select at least 4)</p>
            <label for="f1"><input type="checkbox" id="f1" name="features" value="durability"> Durability</label>
            <label for="f2"><input type="checkbox" id="f2" name="features" value="easy"> Easy to Use</label>
            <label for="f3"><input type="checkbox" id="f3" name="features" value="price"> Price</label>
            <label for="f4"><input type="checkbox" id="f4" name="features" value="design"> Design</label>

            <label for="review">Written Review</label>
            <textarea id="review" name="review" rows="4"></textarea>

            <label for="username">Username</label>
            <input type="text" id="username" name="username">

            <button type="submit">Post Review</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 Joseph Uchenna Offiaeli</p>
    </footer>

    <script src="review.js" defer></script>
</body>
</html>
