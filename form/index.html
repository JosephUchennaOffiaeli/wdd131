<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review Form</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <h1>Product Review Form</h1>
        <form action="review.html" method="get">
            <label for="product">Product Name *</label>
            <select id="product" name="product" required>
                <option value="" disabled selected>Select a Product...</option>
            </select>

            <fieldset>
                <legend>Overall Rating *</legend>
                <div class="radio-group">
                    <label><input type="radio" name="rating" value="1" required> 1</label>
                    <label><input type="radio" name="rating" value="2"> 2</label>
                    <label><input type="radio" name="rating" value="3"> 3</label>
                    <label><input type="radio" name="rating" value="4"> 4</label>
                    <label><input type="radio" name="rating" value="5"> 5</label>
                </div>
            </fieldset>

            <label for="installDate">Date of Installation *</label>
            <input type="date" id="installDate" name="installDate" required>

            <p>Useful Features</p>
            <div class="checkbox-group">
                <label><input type="checkbox" name="features" value="durability"> Durability</label>
                <label><input type="checkbox" name="features" value="easy"> Easy to Use</label>
            </div>

            <label for="review">Written Review</label>
            <textarea id="review" name="review" rows="4"></textarea>

            <label for="username">Username</label>
            <input type="text" id="username" name="username">

            <button type="submit">Post Review</button>
        </form>
    </main>
    <script src="review.js"></script>
</body>
</html>
